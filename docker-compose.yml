version: "3.8"

services:

  cv-service:
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
    build:
      context: ./cv-service
      dockerfile: ../docker/Dockerfile.cv-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - CV_SERVICE_URL=http://cv-service:8001
    depends_on:
      cv-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
